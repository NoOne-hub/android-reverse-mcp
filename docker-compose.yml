services:
  android-reverse-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: android-reverse-mcp:latest
    container_name: android-reverse-mcp
    ports:
      - "8651:8651"
    environment:
      APK: /input/TestActivity.apk
      DECODE_ON_START: "1"
      PORT: "8651"
    volumes:
      - ./samples:/input:ro
      - ./workspace:/workspace
