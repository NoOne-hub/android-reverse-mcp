services:
  android-reverse-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: android-reverse-mcp:latest
    container_name: android-reverse-mcp
    ports:
      - "${PORT:-8651}:${PORT:-8651}"
    environment:
      APK: /input/app.apk
      DECODE_ON_START: "${DECODE_ON_START:-1}"
      PORT: "${PORT:-8651}"
      GHIDRA_AUTO_START: "${GHIDRA_AUTO_START:-1}"
      GHIDRA_HEADLESS_MCP_FAKE_BACKEND: "${GHIDRA_HEADLESS_MCP_FAKE_BACKEND:-0}"
      GHIDRA_BACKEND_HOST: "${GHIDRA_BACKEND_HOST:-127.0.0.1}"
      GHIDRA_BACKEND_PORT: "${GHIDRA_BACKEND_PORT:-8765}"
    volumes:
      - ${WORKSPACE_DIR}:/workspace
      - ${APK_PATH}:/input/app.apk:ro
